<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>Smart Presence | Institutional Portal v4.1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        institutional: {
                            dark: '#020617',
                            card: '#0F172A',
                            accent: '#4F46E5'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --slate-50: #F8FAFC;
            --slate-900: #0F172A;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFFFF;
            color: var(--slate-900);
            margin: 0;
            overflow-x: hidden;
            letter-spacing: -0.01em;
            touch-action: manipulation;
            line-height: 1.6;
        }

        html.dark body {
            background-color: #020617;
            color: #F8FAFC;
        }

        .school-grid {
            background-image: radial-gradient(#cbd5e1 0.4px, transparent 0.4px);
            background-size: 24px 24px;
        }

        html.dark .school-grid {
            background-image: radial-gradient(#1e293b 0.6px, transparent 0.6px);
        }

        .nav-blur {
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
        }

        .page-enter {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tap-active {
            transition: transform 0.1s ease-out;
        }

        .tap-active:active {
            transform: scale(0.96);
        }

        input,
        select {
            font-size: 16px !important;
            padding: 12px 16px;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.error('SW Failed', err));
            });
        }
    </script>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="school-grid min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
